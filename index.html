<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>–Я–†–Ю–°–Ґ–Ю_–Ф–£–®–Э–Ђ–Щ –Ъ–Р–Ы–Х–Э–Ф–Р–†–ђ</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #2d3436; overflow-x: hidden; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #dfe6e9; transition: 0.3s; }
        .nav-btns button.active { background: var(--primary); color: white; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
       .categories { 
            display: grid; 
            /* –Ф–≤–µ –Ї–Њ–ї–Њ–љ–Ї–Є –њ–Њ 50% —И–Є—А–Є–љ—Л */
            grid-template-columns: 1fr 1fr; 
            /* –Ч–∞–њ–Њ–ї–љ–µ–љ–Є–µ —Б–љ–∞—З–∞–ї–∞ –њ–µ—А–≤–Њ–є –Ї–Њ–ї–Њ–љ–Ї–Є –≤–љ–Є–Ј, –њ–Њ—В–Њ–Љ –≤—В–Њ—А–Њ–є */
            grid-auto-flow: column;
            grid-template-rows: repeat(4, auto);
            gap: 10px; 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
        }

        .cat-item { 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            /* –Т—Л—А–∞–≤–љ–Є–≤–∞–љ–Є–µ —Б–Њ–і–µ—А–ґ–Є–Љ–Њ–≥–Њ –њ–Њ –ї–µ–≤–Њ–Љ—Г –Ї—А–∞—О */
            justify-content: flex-start; 
            gap: 10px; 
            cursor: pointer;
            /* –І—В–Њ–±—Л —В–µ–Ї—Б—В –љ–µ –њ–µ—А–µ–љ–Њ—Б–Є–ї—Б—П –Є –љ–µ –ї–Њ–Љ–∞–ї —Б–µ—В–Ї—Г */
            white-space: nowrap; 
        }

        .cat-item input {
            /* –£–±–Є—А–∞–µ–Љ –ї–Є—И–љ–Є–µ –Њ—В—Б—В—Г–њ—Л —Г —Б–∞–Љ–Є—Е –Ї—А—Г–ґ–Ї–Њ–≤, –µ—Б–ї–Є –Њ–љ–Є –µ—Б—В—М */
            margin: 0;
            width: auto;
        }
        
        .btn-submit { background: var(--success); color: white; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; }

        /* –£–≤–µ–і–Њ–Љ–ї–µ–љ–Є—П (Toast) */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .toast { background: #333; color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
                 display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 500;
                 animation: slideIn 0.4s ease forwards, fadeOut 0.4s ease 2.6s forwards; }
        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 0; opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* –Ъ–∞–ї–µ–љ–і–∞—А—М */
        .year-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .year-row button, .month-btn { background: #eee; border: none; border-radius: 8px; cursor: pointer; padding: 10px; font-weight: bold; }
        .year-row button.active, .month-btn.active { background: var(--primary); color: white; }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #f1f2f6; background: #fff; }
        .day.selected { outline: 3px solid var(--primary); z-index: 1; }
        #day-details { margin-top: 20px; padding: 15px; background: #f1f2f6; border-radius: 10px; min-height: 50px; font-size: 14px; }
        .event-line { border-left: 4px solid; padding: 5px 10px; margin-bottom: 8px; background: rgba(255,255,255,0.6); border-radius: 0 5px 5px 0; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card">
    <h2 style="text-align: center; margin-top: 0;">–Я–†–Ю–°–Ґ–Ю_–Ф–£–®–Э–Ђ–Щ –Ъ–Р–Ы–Х–Э–Ф–Р–†–ђ</h2>
    
    <div class="nav-btns">
        <button id="btn-add" class="active" onclick="showTab('add')">–Т–Э–Х–°–Ґ–Ш</button>
        <button id="btn-find" onclick="showTab('find')">–†–Р–Ч–Э–Ѓ–•–Р–Ґ–ђ</button>
    </div>

    <div id="tab-add">
        <label>–Ф–∞—В–∞ –љ–∞—З–∞–ї–∞:</label> <input type="date" id="dateStart">
        <label>–Ф–∞—В–∞ –Ї–Њ–љ—Ж–∞ (–і–Є–∞–њ–∞–Ј–Њ–љ):</label> <input type="date" id="dateEnd">
        <label>–Т—А–µ–Љ—П:</label>
<div style="display: flex; align-items: center; gap: 5px; margin-bottom: 8px;">
    <input type="time" id="timeStart" style="margin: 0; flex: 1;" placeholder="–°">
    <span style="font-weight: bold;">вАФ</span>
    <input type="time" id="timeEnd" style="margin: 0; flex: 1;" placeholder="–Я–Њ">
    <label style="flex: 1; font-size: 12px; display: flex; align-items: center; gap: 3px; cursor: pointer; background: #eee; padding: 8px; border-radius: 8px; white-space: nowrap;">
        <input type="checkbox" id="allDay" style="width: auto; margin: 0;"> –Т–µ—Б—М –і–µ–љ—М
    </label>
</div>
        <input type="text" id="place" placeholder="–Ь–µ—Б—В–Њ –њ–Њ–і –ї—С–ґ–Ї—Г">
        <input type="text" id="title" placeholder="–Э–∞–Ј–≤–∞–љ–Є–µ">
        <div class="categories">
            <label class="cat-item"><input type="radio" name="cat" value="–Ъ–Њ–љ—Ж–µ—А—В"> –Ъ–Њ–љ—Ж–µ—А—В</label>
            <label class="cat-item"><input type="radio" name="cat" value="–†–µ–њ–µ—В–Є—Ж–Є—П"> –†–µ–њ–µ—В–Є—Ж–Є—П</label>
            <label class="cat-item"><input type="radio" name="cat" value="–§–µ—Б—В"> –§–µ—Б—В</label>
            <label class="cat-item"><input type="radio" name="cat" value="–Ш–°–Ш"> –Ш–°–Ш</label>
            <label class="cat-item"><input type="radio" name="cat" value="–Ф–†"> –Ф–†</label>
            <label class="cat-item"><input type="radio" name="cat" value="–У–ї–∞–і–Є–∞—В–Њ—А"> –У–ї–∞–і–Є–∞—В–Њ—А</label>
            <label class="cat-item"><input type="radio" name="cat" value="–Я–Њ–µ–Ј–і–Ї–∞"> –Я–Њ–µ–Ј–і–Ї–∞</label>
            <label class="cat-item"><input type="radio" name="cat" value="–Ф—А—Г–≥–Њ–µ"> –Ф—А—Г–≥–Њ–µ</label>
        </div>
        <button class="btn-submit" id="main-submit" onclick="sendToGas()">рЯРЊ–Ч–Р–Ъ–Ю–Я–Р–Ґ–ђ –Т –Ъ–Р–Ы–Х–Э–Ф–Р–†–ђрЯРЊ</button>
    </div>

    <div id="tab-find" style="display:none;">
        <div class="year-row" id="year-btns">
            <button onclick="setYear(2024)">2024</button>
            <button onclick="setYear(2025)">2025</button>
            <button onclick="setYear(2026)">2026</button>
        </div>
        <div class="month-grid" id="month-buttons"></div>
        <div id="calendar-days" class="calendar-days"></div>
        <div id="day-details">–Т—Л–±–µ—А–Є—В–µ –і–∞—В—Г...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxRcFveRSwoOX2xhiS48tz0m2crUiZkrxaVguqrcbl8Z_y_BimWvO4GnE3d_QgGUhinuQ/exec"; 
    let dbData = null;
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    const MONTHS = ["–ѓ–Э–Т","–§–Х–Т","–Ь–Р–†–Ґ","–Р–Я–†","–Ь–Р–Щ","–Ш–Ѓ–Э–ђ","–Ш–Ѓ–Ы–ђ","–Р–Т–У","–°–Х–Э–Ґ","–Ю–Ъ–Ґ","–Э–Ю–ѓ–С","–Ф–Х–Ъ"];

    function showToast(text, color = "var(--primary)") {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = color;
        toast.innerText = text;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showTab(tab) {
        document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
        document.getElementById('tab-find').style.display = tab === 'find' ? 'block' : 'none';
        document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        if(tab === 'find') loadData();
    }

    async function loadData() {
    try {
        const resp = await fetch(API_URL);
        dbData = await resp.json();
        renderYearBtns();
        renderMonths();
        renderCalendar(currentMonth); // –≠—В–Њ –Њ–±–љ–Њ–≤–Є—В —Ж–≤–µ—В–∞ –љ–∞ –Ї–љ–Њ–њ–Ї–∞—Е —З–Є—Б–µ–ї
    } catch(e) { 
        showToast("–Ю—И–Є–±–Ї–∞ —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є–Є", "var(--error)"); 
    }
}

    function renderYearBtns() {
        document.querySelectorAll('#year-btns button').forEach(b => b.classList.toggle('active', b.innerText == currentYear));
    }

    function setYear(y) { currentYear = y; renderYearBtns(); renderCalendar(currentMonth); }

    function renderMonths() {
        const grid = document.getElementById('month-buttons');
        grid.innerHTML = MONTHS.map((m, i) => `<button class="month-btn ${i === currentMonth ? 'active' : ''}" onclick="renderCalendar(${i})">${m}</button>`).join('');
    }

    function renderCalendar(mIdx) {
    currentMonth = mIdx;
    renderMonths();
    const grid = document.getElementById('calendar-days');
    grid.innerHTML = '';
    const daysInMonth = new Date(currentYear, mIdx + 1, 0).getDate();
    
    const firstDay = new Date(currentYear, mIdx, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';

    for(let d=1; d<=daysInMonth; d++) {
        // –Ш—Й–µ–Љ –і–∞–љ–љ—Л–µ, –њ–µ—А–µ–і–∞–≤–∞—П –Ф–Х–Э–ђ, –Ь–Х–°–ѓ–¶ –Є –Ґ–Х–Ъ–£–©–Ш–Щ –Т–Ђ–С–†–Р–Э–Э–Ђ–Щ –У–Ю–Ф
        const events = getDayData(d, mIdx, currentYear);
        
        let bg = '#fff';
        if (events.length > 1) bg = '#b2bec3';
        else if (events.length === 1) bg = events[0].color;
        
        grid.innerHTML += `<div class="day" style="background:${bg}" onclick="showDayDetails(${d}, ${mIdx}, ${currentYear}, this)">${d}</div>`;
    }
}

    function getDayData(d, m, y) {
    let evs = [];
    if (!dbData) return evs;

    // –°–Њ–±–Є—А–∞–µ–Љ —Б—В—А–Њ–Ї—Г –њ–Њ–Є—Б–Ї–∞: "13.03.2025" –Є–ї–Є "01.01.2024"
    const searchDate = ("0" + d).slice(-2) + "." + ("0" + (m + 1)).slice(-2) + "." + y;

    const vals = dbData.values;
    const bgs = dbData.colors;

    for(let r=0; r<vals.length; r++) {
        for(let c=0; c<vals[r].length; c++) {
            // –°—А–∞–≤–љ–Є–≤–∞–µ–Љ —П—З–µ–є–Ї—Г —Б –љ–∞—И–µ–є —Б—В—А–Њ–Ї–Њ–є (–љ–∞–њ—А–Є–Љ–µ—А "13.03.2025")
            if (vals[r][c] === searchDate) {
                // –Х—Б–ї–Є –і–∞—В–∞ —Б–Њ–≤–њ–∞–ї–∞, –Ј–∞–±–Є—А–∞–µ–Љ 14 —Б—В—А–Њ–Ї –њ–Њ–і –љ–µ–є
                for(let h=1; h<=14; h++) {
                    if (vals[r+h] && vals[r+h][c] && vals[r+h][c].trim() !== "") {
                        evs.push({ text: vals[r+h][c], color: bgs[r+h][c] });
                    }
                }
            }
        }
    }
    return evs;
}

    // –§—Г–љ–Ї—Ж–Є—П —Г–і–∞–ї–µ–љ–Є—П –і–∞–љ–љ—Л—Е
async function deleteEvent(eventText, d, m, y) {
    if (!confirm(`–Ґ–Њ—З–љ–Њ –≤—Л–Ї–Њ–њ–∞—В—М "${eventText}"?`)) return;

    showToast("–Т—Л–Ї–∞–њ—Л–≤–∞–µ–Љ...");
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'DELETE', text: eventText })
        });
        const result = await response.text();
        
        if (result.includes("–Ч–∞–Ї–Њ–њ–∞–љ–Њ")) {
            showToast("–Т—Л–Ї–Њ–њ–∞–љ–Њ!рЯРЇ", "var(--success)");
            
            // –Р–Т–Ґ–Ю-–Ю–С–Э–Ю–Т–Ы–Х–Э–Ш–Х: –Я–µ—А–µ–Ї–∞—З–Є–≤–∞–µ–Љ –±–∞–Ј—Г –Є –њ–µ—А–µ—А–Є—Б–Њ–≤—Л–≤–∞–µ–Љ –Ї–∞–ї–µ–љ–і–∞—А—М
            await loadData(); 
            // –Ю–±–љ–Њ–≤–ї—П–µ–Љ –і–µ—В–∞–ї–Є–Ј–∞—Ж–Є—О —В–µ–Ї—Г—Й–µ–≥–Њ –і–љ—П, —З—В–Њ–±—Л —Б–Њ–±—Л—В–Є–µ –Є—Б—З–µ–Ј–ї–Њ –Є–Ј —Б–њ–Є—Б–Ї–∞ –≤–љ–Є–Ј—Г
            const activeDay = document.querySelector('.day.selected');
            if (activeDay) {
                showDayDetails(d, m, y, activeDay);
            }
        }
    } catch(e) {
        showToast("–Ю—И–Є–±–Ї–∞ –њ—А–Є —Г–і–∞–ї–µ–љ–Є–Є", "var(--error)");
    }
}
    
function showDayDetails(d, m, y, el) {
    document.querySelectorAll('.day').forEach(div => div.classList.remove('selected'));
    el.classList.add('selected');
    
    const evs = getDayData(d, m, y);
    const box = document.getElementById('day-details');
    // –§–Њ—А–Љ–Є—А—Г–µ–Љ –і–∞—В—Г –і–ї—П –њ–Њ–і—Б—В–∞–љ–Њ–≤–Ї–Є –≤ –Є–љ–њ—Г—В (YYYY-MM-DD)
    const dateForInput = `${y}-${("0" + (m + 1)).slice(-2)}-${("0" + d).slice(-2)}`;
    const dateTitle = ("0" + d).slice(-2) + "." + ("0" + (m + 1)).slice(-2) + "." + y;
    
    let html = `<b>${dateTitle}:</b><br><br>`;
    
    if (evs.length > 0) {
        html += evs.map(e => `
            <div class="event-line" style="border-color:${e.color}; display: flex; justify-content: space-between; align-items: center;">
                <span style="flex: 1; padding-right: 10px;">${e.text}</span>
                <span onclick="deleteEvent('${e.text}', ${d}, ${m}, ${y})" style="cursor:pointer; padding: 5px; font-size: 18px;">рЯЧСпЄП</span>
            </div>
        `).join('');
    } else {
        html += "–Э–Є—З–µ–≥–Њ –љ–µ –Ј–∞–Ї–Њ–њ–∞–љ–Њ.<br>";
    }

    // –Ф–Ю–С–Р–Т–Ы–ѓ–Х–Ь –Ъ–Э–Ю–Я–Ъ–£ –Я–Х–†–Х–•–Ю–Ф–Р
    html += `
        <button onclick="goToAddTab('${dateForInput}')" style="margin-top: 15px; background: #6c5ce7; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">
            вЮХ –Ч–Р–Ъ–Ю–Я–Р–Ґ–ђ –Т –≠–Ґ–£ –Ф–Р–Ґ–£
        </button>
    `;
    
    box.innerHTML = html;
}

    function goToAddTab(dateStr) {
    // 1. –Я–Њ–і—Б—В–∞–≤–ї—П–µ–Љ –і–∞—В—Г –≤ –Є–љ–њ—Г—В –љ–∞—З–∞–ї–∞
    document.getElementById('dateStart').value = dateStr;
    // 2. –Ю—З–Є—Й–∞–µ–Љ –і–∞—В—Г –Ї–Њ–љ—Ж–∞ (–љ–∞ —Б–ї—Г—З–∞–є –µ—Б–ї–Є —В–∞–Љ —З—В–Њ-—В–Њ –±—Л–ї–Њ)
    document.getElementById('dateEnd').value = "";
    // 3. –°–±—А–∞—Б—Л–≤–∞–µ–Љ –±–ї–Њ–Ї–Є—А–Њ–≤–Ї—Г –≤—А–µ–Љ–µ–љ–Є (—В–∞–Ї –Ї–∞–Ї –і–∞—В–∞ —В–µ–њ–µ—А—М –Њ–і–љ–∞)
    checkDateRange(); 
    // 4. –Я–µ—А–µ–Ї–ї—О—З–∞–µ–Љ –≤–Ї–ї–∞–і–Ї—Г
    showTab('add');
    // 5. –°–Ї—А–Њ–ї–ї–Є–Љ –≤–≤–µ—А—Е, —З—В–Њ–±—Л —Б—А–∞–Ј—Г –≤–Є–і–µ—В—М —Д–Њ—А–Љ—Г
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    showToast("–Ф–∞—В–∞ –њ–Њ–і—Б—В–∞–≤–ї–µ–љ–∞! рЯРЊ");
}

    // –§—Г–љ–Ї—Ж–Є—П –≤–љ–µ—Б–µ–љ–Є—П –і–∞–љ–љ—Л—Е
async function sendToGas() {
    const btn = document.getElementById('main-submit');
    const data = {
        dateStart: document.getElementById('dateStart').value,
        dateEnd: document.getElementById('dateEnd').value || document.getElementById('dateStart').value,
        timeStart: document.getElementById('timeStart').value,
        timeEnd: document.getElementById('timeEnd').value,
        isFullDay: document.getElementById('allDay').checked,
        place: document.getElementById('place').value,
        title: document.getElementById('title').value,
        category: document.querySelector('input[name="cat"]:checked')?.value
    };

    if (!data.dateStart || !data.title || !data.category) {
        showToast("–Ч–∞–њ–Њ–ї–љ–Є –Ф–∞—В—Г, –Э–∞–Ј–≤–∞–љ–Є–µ –Є –Ъ–∞—В–µ–≥–Њ—А–Є—О!", "var(--error)");
        return;
    }

    btn.innerText = "–Ч–Р–Ъ–Р–Я–Ђ–Т–Р–Х–Ь...";
    btn.disabled = true;

    try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        const result = await response.text();
        
        if (result.includes("–Ч–∞–Ї–Њ–њ–∞–љ–Њ")) {
            showToast("–£—Б–њ–µ—И–љ–Њ –Ј–∞–Ї–Њ–њ–∞–љ–Њ! рЯРЇ", "var(--success)");
            // –Ю—З–Є—Б—В–Ї–∞ –њ–Њ–ї–µ–є —Д–Њ—А–Љ—Л
            document.getElementById('title').value = "";
            document.getElementById('place').value = "";
            document.getElementById('timeStart').value = "";
            document.getElementById('timeEnd').value = "";
            
            // –Р–Т–Ґ–Ю-–Ю–С–Э–Ю–Т–Ы–Х–Э–Ш–Х: –Я–Њ–і—В—П–≥–Є–≤–∞–µ–Љ –љ–Њ–≤—Л–µ –і–∞–љ–љ—Л–µ –Є–Ј —В–∞–±–ї–Є—Ж—Л
            await loadData(); 
            btn.disabled = false;
            btn.innerText = "рЯРЊ –Ч–Р–Ъ–Ю–Я–Р–Ґ–ђ –Т –Ъ–Р–Ы–Х–Э–Ф–Р–†–ђ рЯРЊ";
        }
    } catch(e) {
        showToast("–Ю—И–Є–±–Ї–∞ —Б–µ—В–Є", "var(--error)");
        btn.disabled = false;
    }
}

</script>
</body>
</html>
