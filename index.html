<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОСТО_ДУШНЫЙ КАЛЕНДАРЬ</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #2d3436; overflow-x: hidden; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #dfe6e9; transition: 0.3s; }
        .nav-btns button.active { background: var(--primary); color: white; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
       .categories { 
            display: grid; 
            /* Две колонки по 50% ширины */
            grid-template-columns: 1fr 1fr; 
            /* Заполнение сначала первой колонки вниз, потом второй */
            grid-auto-flow: column;
            grid-template-rows: repeat(4, auto);
            gap: 10px; 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
        }

        .cat-item { 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            /* Выравнивание содержимого по левому краю */
            justify-content: flex-start; 
            gap: 10px; 
            cursor: pointer;
            /* Чтобы текст не переносился и не ломал сетку */
            white-space: nowrap; 
        }

        .cat-item input {
            /* Убираем лишние отступы у самих кружков, если они есть */
            margin: 0;
            width: auto;
        }
        
        .btn-submit { background: var(--success); color: white; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; }

        /* Уведомления (Toast) */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .toast { background: #333; color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
                 display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 500;
                 animation: slideIn 0.4s ease forwards, fadeOut 0.4s ease 2.6s forwards; }
        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 0; opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Календарь */
        .year-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .year-row button, .month-btn { background: #eee; border: none; border-radius: 8px; cursor: pointer; padding: 10px; font-weight: bold; }
        .year-row button.active, .month-btn.active { background: var(--primary); color: white; }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #f1f2f6; background: #fff; }
        .day.selected { outline: 3px solid var(--primary); z-index: 1; }
        #day-details { margin-top: 20px; padding: 15px; background: #f1f2f6; border-radius: 10px; min-height: 50px; font-size: 14px; }
        .event-line { border-left: 4px solid; padding: 5px 10px; margin-bottom: 8px; background: rgba(255,255,255,0.6); border-radius: 0 5px 5px 0; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card">
    <h2 style="text-align: center; margin-top: 0;">ПРОСТО_ДУШНЫЙ КАЛЕНДАРЬ</h2>
    
    <div class="nav-btns">
        <button id="btn-add" class="active" onclick="showTab('add')">ВНЕСТИ</button>
        <button id="btn-find" onclick="showTab('find')">РАЗНЮХАТЬ</button>
    </div>

    <div id="tab-add">
        <input type="hidden" id="editOldText" value="">
        <label>Дата начала:</label> <input type="date" id="dateStart">
        <label>Дата конца (диапазон):</label> <input type="date" id="dateEnd">
        <label>Время:</label>
<div style="display: flex; align-items: center; gap: 5px; margin-bottom: 8px;">
  
  <!-- Блок ОТ -->
  <div style="display: flex; align-items: center; background: #fff; border: 1px solid #ccc; padding: 2px 5px; border-radius: 4px; flex: 1;">
    <input type="tel" id="hhStart" placeholder="00" maxlength="2" style="width: 25px; border: none; text-align: center; padding: 5px 0;" oninput="if(this.value.length==2) document.getElementById('mmStart').focus()">
    <span>:</span>
    <input type="tel" id="mmStart" placeholder="00" maxlength="2" style="width: 25px; border: none; text-align: center; padding: 5px 0;">
  </div>

  <span style="font-weight: bold;">—</span>

  <!-- Блок ДО -->
  <div style="display: flex; align-items: center; background: #fff; border: 1px solid #ccc; padding: 2px 5px; border-radius: 4px; flex: 1;">
    <input type="tel" id="hhEnd" placeholder="00" maxlength="2" style="width: 25px; border: none; text-align: center; padding: 5px 0;" oninput="if(this.value.length==2) document.getElementById('mmEnd').focus()">
    <span>:</span>
    <input type="tel" id="mmEnd" placeholder="00" maxlength="2" style="width: 25px; border: none; text-align: center; padding: 5px 0;">
  </div>

  <label style="flex: 1; font-size: 12px; display: flex; align-items: center; gap: 3px; cursor: pointer; background: #eee; padding: 8px; border-radius: 8px; white-space: nowrap;">
      <input type="checkbox" id="allDay" style="width: auto; margin: 0;"> Весь день
  </label>
</div>
        <input type="text" id="place" placeholder="Место под лёжку">
        <input type="text" id="title" placeholder="Название">
        <div class="categories">
            <label class="cat-item"><input type="radio" name="cat" value="Концерт"> Концерт</label>
            <label class="cat-item"><input type="radio" name="cat" value="Репетиция"> Репетиция</label>
            <label class="cat-item"><input type="radio" name="cat" value="Фест"> Фест</label>
            <label class="cat-item"><input type="radio" name="cat" value="ИСИ"> ИСИ</label>
            <label class="cat-item"><input type="radio" name="cat" value="ДР"> ДР</label>
            <label class="cat-item"><input type="radio" name="cat" value="Гладиатор"> Гладиатор</label>
            <label class="cat-item"><input type="radio" name="cat" value="Поездка"> Поездка</label>
            <label class="cat-item"><input type="radio" name="cat" value="Другое"> Другое</label>
        </div>
        <button class="btn-submit" id="main-submit" onclick="sendToGas()">🐾ЗАКОПАТЬ В КАЛЕНДАРЬ🐾</button>
    </div>

    <div id="tab-find" style="display:none;">
        <div class="year-row" id="year-btns">
            <button onclick="setYear(2024)">2024</button>
            <button onclick="setYear(2025)">2025</button>
            <button onclick="setYear(2026)">2026</button>
        </div>
        <div class="month-grid" id="month-buttons"></div>
        <div id="calendar-days" class="calendar-days"></div>
        <div id="day-details">Выберите дату...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxRcFveRSwoOX2xhiS48tz0m2crUiZkrxaVguqrcbl8Z_y_BimWvO4GnE3d_QgGUhinuQ/exec"; 
    let dbData = null;
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    const MONTHS = ["ЯНВ","ФЕВ","МАРТ","АПР","МАЙ","ИЮНЬ","ИЮЛЬ","АВГ","СЕНТ","ОКТ","НОЯБ","ДЕК"];

    function showToast(text, color = "var(--primary)") {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = color;
        toast.innerText = text;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showTab(tab) {
        document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
        document.getElementById('tab-find').style.display = tab === 'find' ? 'block' : 'none';
        document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        if(tab === 'find') loadData();
    }

    async function loadData() {
    try {
        const resp = await fetch(API_URL);
        dbData = await resp.json();
        renderYearBtns();
        renderMonths();
        renderCalendar(currentMonth); // Это обновит цвета на кнопках чисел
    } catch(e) { 
        showToast("Ошибка синхронизации", "var(--error)"); 
    }
}

    function renderYearBtns() {
        document.querySelectorAll('#year-btns button').forEach(b => b.classList.toggle('active', b.innerText == currentYear));
    }

    function setYear(y) { currentYear = y; renderYearBtns(); renderCalendar(currentMonth); }

    function renderMonths() {
        const grid = document.getElementById('month-buttons');
        grid.innerHTML = MONTHS.map((m, i) => `<button class="month-btn ${i === currentMonth ? 'active' : ''}" onclick="renderCalendar(${i})">${m}</button>`).join('');
    }

    function renderCalendar(mIdx) {
    currentMonth = mIdx;
    renderMonths();
    const grid = document.getElementById('calendar-days');
    grid.innerHTML = '';
    const daysInMonth = new Date(currentYear, mIdx + 1, 0).getDate();
    
    const firstDay = new Date(currentYear, mIdx, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';

    for(let d=1; d<=daysInMonth; d++) {
        // Ищем данные, передавая ДЕНЬ, МЕСЯЦ и ТЕКУЩИЙ ВЫБРАННЫЙ ГОД
        const events = getDayData(d, mIdx, currentYear);
        
        let bg = '#fff';
        if (events.length > 1) bg = '#b2bec3';
        else if (events.length === 1) bg = events[0].color;
        
        grid.innerHTML += `<div class="day" style="background:${bg}" onclick="showDayDetails(${d}, ${mIdx}, ${currentYear}, this)">${d}</div>`;
    }
}

    function getDayData(d, m, y) {
    let evs = [];
    if (!dbData) return evs;

    // Собираем строку поиска: "13.03.2025" или "01.01.2024"
    const searchDate = ("0" + d).slice(-2) + "." + ("0" + (m + 1)).slice(-2) + "." + y;

    const vals = dbData.values;
    const bgs = dbData.colors;

    for(let r=0; r<vals.length; r++) {
        for(let c=0; c<vals[r].length; c++) {
            // Сравниваем ячейку с нашей строкой (например "13.03.2025")
            if (vals[r][c] === searchDate) {
                // Если дата совпала, забираем 14 строк под ней
                for(let h=1; h<=14; h++) {
                    if (vals[r+h] && vals[r+h][c] && vals[r+h][c].trim() !== "") {
                        evs.push({ text: vals[r+h][c], color: bgs[r+h][c] });
                    }
                }
            }
        }
    }
    return evs;
}

    // Функция удаления данных
async function deleteEvent(eventText, d, m, y) {

    showToast("Выкапываем...");
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'DELETE', text: eventText })
        });
        const result = await response.text();
        
        if (result.includes("Закопано")) {
            showToast("Выкопано!🐺", "var(--success)");
            
            // АВТО-ОБНОВЛЕНИЕ: Перекачиваем базу и перерисовываем календарь
            await loadData(); 
            // Обновляем детализацию текущего дня, чтобы событие исчезло из списка внизу
            const activeDay = document.querySelector('.day.selected');
            if (activeDay) {
                showDayDetails(d, m, y, activeDay);
            }
        }
    } catch(e) {
        showToast("Ошибка при удалении", "var(--error)");
    }
}
    
function showDayDetails(d, m, y, el) {
    document.querySelectorAll('.day').forEach(div => div.classList.remove('selected'));
    el.classList.add('selected');
    
    const evs = getDayData(d, m, y);
    const box = document.getElementById('day-details');
    // Формируем дату для подстановки в инпут (YYYY-MM-DD)
    const dateForInput = `${y}-${("0" + (m + 1)).slice(-2)}-${("0" + d).slice(-2)}`;
    const dateTitle = ("0" + d).slice(-2) + "." + ("0" + (m + 1)).slice(-2) + "." + y;
    
    let html = `<b>${dateTitle}:</b><br><br>`;
    
    if (evs.length > 0) {
        html += evs.map(e => `
  <div class="event-line" style="border-color:${e.color}; display: flex; justify-content: space-between; align-items: center;">
    <span style="flex: 1; padding-right: 10px;">${e.text}</span>
    <div style="display: flex; gap: 10px;">
      <!-- Кнопка редактирования -->
      <span onclick="prepareEdit('${e.text.replace(/'/g, "\\'")}', '${dateForInput}', '${e.color}')" style="cursor:pointer; font-size: 18px;">✏️</span>
      <!-- Твоя старая кнопка удаления -->
      <span onclick="deleteEvent('${e.text.replace(/'/g, "\\'")}', ${d}, ${m}, ${y})" style="cursor:pointer; font-size: 18px;">🗑️</span>
    </div>
  </div>
`).join('');
    } else {
        html += "Ничего не закопано.<br>";
    }

    // ДОБАВЛЯЕМ КНОПКУ ПЕРЕХОДА
    html += `
        <button onclick="goToAddTab('${dateForInput}')" style="margin-top: 15px; background: #6c5ce7; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">
            ➕ ЗАКОПАТЬ В ЭТУ ДАТУ
        </button>
    `;
    
    box.innerHTML = html;
}

   function goToAddTab(dateStr) {
    // 1. Находим инпут даты начала и подставляем значение
    const dateInput = document.getElementById('dateStart');
    if (dateInput) {
        dateInput.value = dateStr;
    }
    
    // 2. Очищаем дату конца, чтобы не было диапазона
    const dateEndInput = document.getElementById('dateEnd');
    if (dateEndInput) {
        dateEndInput.value = "";
    }

    // 3. Вызываем визуальное переключение вкладки
    showTab('add');

    // 4. Принудительно вызываем проверку диапазона, чтобы разблокировать время
    if (typeof checkDateRange === "function") {
        checkDateRange();
    }

    // 5. Прокрутка вверх, чтобы сразу видеть поля ввода на смартфоне
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });

    showToast("Дата подставлена! 🐺");
}

    // Функция внесения данных
async function sendToGas() {
    const oldText = document.getElementById('editOldText').value;
    if (oldText) {
        showToast("Обновляем старую запись...");
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ type: 'DELETE', text: oldText })
        });
    }
    
    const btn = document.getElementById('main-submit');
    const data = {
        dateStart: document.getElementById('dateStart').value,
        dateEnd: document.getElementById('dateEnd').value || document.getElementById('dateStart').value,
        timeStart: document.getElementById('hhStart').value + ":" + document.getElementById('mmStart').value,
        timeEnd: document.getElementById('hhEnd').value + ":" + document.getElementById('mmEnd').value,
        isFullDay: document.getElementById('allDay').checked,
        place: document.getElementById('place').value,
        title: document.getElementById('title').value,
        category: document.querySelector('input[name="cat"]:checked')?.value
    };

    if (!data.dateStart || !data.title || !data.category) {
        showToast("Заполни Дату, Название и Категорию!", "var(--error)");
        return;
    }

    btn.innerText = "ЗАКАПЫВАЕМ...";
    btn.disabled = true;

    try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        const result = await response.text();
        
        if (result.includes("Закопано")) {
            showToast("Успешно закопано! 🐺", "var(--success)");
    
            // Очистка полей формы
            document.getElementById('editOldText').value = "";
document.getElementById('title').value = "";
document.getElementById('place').value = "";

// Исправленная очистка времени:
document.getElementById('hhStart').value = "";
document.getElementById('mmStart').value = "";
document.getElementById('hhEnd').value = "";
document.getElementById('mmEnd').value = "";

// Также стоит сбросить чекбокс "Весь день" и радиокнопку
document.getElementById('allDay').checked = false;
const checkedCat = document.querySelector('input[name="cat"]:checked');
if (checkedCat) checkedCat.checked = false;
            
            // АВТО-ОБНОВЛЕНИЕ: Подтягиваем новые данные из таблицы
            await loadData(); 
            btn.disabled = false;
            btn.innerText = "🐾 ЗАКОПАТЬ В КАЛЕНДАРЬ 🐾";
        }
    } catch(e) {
        showToast("Ошибка сети", "var(--error)");
        btn.disabled = false;
    }
}
    
function prepareEdit(fullText, dateStr, color) {
    // 1. Запоминаем старый текст для удаления
    document.getElementById('editOldText').value = fullText;

    // 2. Ставим дату
    document.getElementById('dateStart').value = dateStr;

    // 3. Пытаемся вытащить время (формат "10:00-12:00 Текст" или "10:00 Текст")
    const timeMatch = fullText.match(/^(\d{2}:\d{2})(?:-(\d{2}:\d{2}))?\s(.*)/);
    let titlePart = fullText;

    if (timeMatch) {
        const [_, start, end, rest] = timeMatch;
        const [hS, mS] = start.split(':');
        document.getElementById('hhStart').value = hS;
        document.getElementById('mmStart').value = mS;
        if (end) {
            const [hE, mE] = end.split(':');
            document.getElementById('hhEnd').value = hE;
            document.getElementById('mmEnd').value = mE;
        }
        titlePart = rest;
        document.getElementById('allDay').checked = false;
    } else {
        document.getElementById('allDay').checked = true;
    }

    // 4. Вытаскиваем Место из скобок "Название (Место)"
    const placeMatch = titlePart.match(/(.*)\s\((.*)\)/);
    if (placeMatch) {
        document.getElementById('title').value = placeMatch[1].trim(); // Индекс [1] - это Название
        document.getElementById('place').value = placeMatch[2].trim(); // Индекс [2] - это Место
    } else {
        document.getElementById('title').value = titlePart.trim();
        document.getElementById('place').value = "";
    }

    // 5. Переключаем на вкладку "Внести"
    showTab('add');
    
    showToast("Редактируем запись... ✍️");
}
    
</script>
</body>
</html>
